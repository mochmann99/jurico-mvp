<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jurico AI</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        #output {
            margin-top: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Jurico AI</h2>

    <textarea id="input" placeholder="Vertrag oder Text eingeben..."></textarea>

    <button onclick="analysieren()">Analysieren</button>

    <div id="output"></div>
</div>

<script>
async function analysieren() {
    const text = document.getElementById("input").value;

    const output = document.getElementById("output");
    output.innerText = "Analysiere...";

    try {
        const res = await fetch("https://jurico.onrender.com/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                beschreibung: text
            })
        });

        const data = await res.json();

        if (data.analyse) {
            output.innerText = data.analyse;
        } else {
            output.innerText = "Fehler:\n" + data.error;
        }

    } catch (err) {
        output.innerText = "Frontend Fehler:\n" + err;
    }
}
</script>

</body>
</html>
