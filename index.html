<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jurico AI</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            font-size: 16px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #eef;
            border-radius: 5px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Jurico AI</h1>

    <label>Vertrag / Text eingeben:</label>
    <textarea id="inputText"></textarea>

    <button onclick="analyze()">Analysieren</button>

    <div class="result" id="result"></div>
</div>

<script>
async function analyze() {
    const text = document.getElementById("inputText").value;

    const response = await fetch("https://jurico.onrender.com/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            beschreibung: text
        })
    });

    const data = await response.json();
    document.getElementById("result").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
