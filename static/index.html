<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jurico</title>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family: Arial;
    padding:40px;
}

.container {
    max-width:600px;
    margin:auto;
}

textarea {
    width:100%;
    height:150px;
    margin-top:10px;
    padding:10px;
    background:#111;
    color:white;
    border:1px solid #333;
}

button {
    width:100%;
    margin-top:10px;
    padding:12px;
    background:white;
    color:black;
    border:none;
    cursor:pointer;
}

.result {
    margin-top:20px;
    background:#111;
    padding:20px;
}
</style>

</head>

<body>

<div class="container">

<h1>Jurico</h1>

<input id="email" placeholder="E-Mail" style="width:100%;padding:10px;">

<textarea id="text" placeholder="Vertrag einfügen..."></textarea>

<button onclick="analyze()">Vertrag prüfen</button>

<button onclick="checkout()">Pro freischalten</button>

<div id="output" class="result"></div>

</div>

<script>

async function analyze() {

    const email = document.getElementById("email").value;
    const text = document.getElementById("text").value;

    const res = await fetch("/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({email, text})
    });

    if (res.status === 403) {
        document.getElementById("output").innerText = "Upgrade erforderlich.";
        return;
    }

    const data = await res.json();
    document.getElementById("output").innerText = data.result;
}

async function checkout() {

    const email = document.getElementById("email").value;

    const res = await fetch("/create-checkout-session", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({email})
    });

    const data = await res.json();

    window.location.href = data.url;
}

</script>

</body>
</html>
