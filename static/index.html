<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jurico Payment</title>
<script src="https://js.stripe.com/v3/"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    padding:40px;
}
.container {
    max-width:600px;
    margin:auto;
}
input, textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#111;
    color:white;
    border:1px solid #333;
}
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:white;
    color:black;
    border:none;
}
</style>

</head>

<body>

<div class="container">

<h1>Jurico Pro</h1>

<input id="email" placeholder="E-Mail">

<textarea id="text" placeholder="Vertrag..."></textarea>

<button onclick="analyze()">Analyse</button>

<h2>Pro freischalten (79€)</h2>

<div id="card-element"></div>

<button onclick="pay()">Jetzt bezahlen</button>

<div id="result"></div>

</div>

<script>

const stripe = Stripe("pk_test_xxx"); // DEIN PUBLIC KEY
const elements = stripe.elements();
const card = elements.create("card");
card.mount("#card-element");

let customerId = null;

async function pay() {

    const email = document.getElementById("email").value;

    // 1. Customer erstellen
    let res = await fetch("/create-customer", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({email})
    });

    let data = await res.json();
    customerId = data.customer_id;

    // 2. PaymentIntent
    res = await fetch("/create-payment-intent", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({customer_id:customerId})
    });

    data = await res.json();

    // 3. Zahlung bestätigen
    const result = await stripe.confirmCardPayment(data.client_secret, {
        payment_method: {
            card: card,
            billing_details: { email: email }
        }
    });

    if (result.error) {
        document.getElementById("result").innerText = result.error.message;
        return;
    }

    // 4. Subscription starten
    await fetch("/create-subscription", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({customer_id:customerId})
    });

    // 5. User aktivieren
    await fetch("/activate-user", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({email})
    });

    document.getElementById("result").innerText = "Pro aktiviert!";
}

async function analyze() {

    const email = document.getElementById("email").value;
    const text = document.getElementById("text").value;

    const res = await fetch("/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({email, text})
    });

    const data = await res.json();

    document.getElementById("result").innerText = data.result || data.detail;
}

</script>

</body>
</html>
