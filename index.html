<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jurico AI</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 500px;
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            background: #0f172a;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Jurico AI</h2>

    <textarea id="input" placeholder="Vertrag oder Text eingeben..."></textarea>

    <button onclick="analyze()">Analysieren</button>

    <div class="result" id="output"></div>
</div>

<script>
async function analyze() {
    const text = document.getElementById("input").value;

    const response = await fetch("https://jurico.onrender.com/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            beschreibung: text
        })
    });

    const data = await response.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
