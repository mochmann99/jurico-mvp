<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jurico V6</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 50px 20px;
}

.header {
    margin-bottom: 40px;
}

.logo {
    font-size: 34px;
    font-weight: 700;
}

.subtitle {
    color: #9ca3af;
    margin-top: 8px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
}

.card {
    background: #111;
    border: 1px solid #222;
    padding: 24px;
    border-radius: 14px;
}

input, textarea {
    width: 100%;
    box-sizing: border-box;
    background: #0a0a0a;
    color: white;
    border: 1px solid #333;
    padding: 14px;
    margin-top: 12px;
    border-radius: 8px;
}

textarea {
    height: 220px;
    resize: vertical;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: white;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.secondary {
    background: #1f2937;
    color: white;
}

.output {
    background: #050505;
    border: 1px solid #222;
    padding: 20px;
    border-radius: 10px;
    white-space: pre-wrap;
    min-height: 260px;
}

.history-item {
    border-bottom: 1px solid #333;
    padding: 12px 0;
    color: #d1d5db;
}

.small {
    color: #9ca3af;
    font-size: 13px;
}

@media(max-width: 800px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">Jurico V6</div>
        <div class="subtitle">Vertragsanalyse · Risiko-Score · PDF-Berichte · Pro-Abo</div>
    </div>

    <div class="grid">

        <div class="card">
            <h2>Neue Analyse</h2>

            <input id="email" placeholder="E-Mail-Adresse">

            <textarea id="text" placeholder="Vertrag, Klausel oder Sachverhalt einfügen..."></textarea>

            <button onclick="analyze()">Vertrag prüfen</button>
            <button class="secondary" onclick="checkout()">Pro freischalten</button>
            <button class="secondary" onclick="loadHistory()">Analyseverlauf laden</button>

            <p class="small">
                Kostenlos: 1 Analyse. Danach Pro-Zugang erforderlich.
            </p>
        </div>

        <div class="card">
            <h2>Analyse Ergebnis</h2>
            <div id="output" class="output">Noch keine Analyse gestartet.</div>
            <button id="pdfButton" class="secondary" style="display:none;" onclick="downloadPdf()">PDF herunterladen</button>
        </div>

    </div>

    <div class="card" style="margin-top:24px;">
        <h2>Analyseverlauf</h2>
        <div id="history">Noch kein Verlauf geladen.</div>
    </div>

</div>

<script>
let lastAnalysisId = null;

async function analyze() {
    const email = document.getElementById("email").value.trim();
    const text = document.getElementById("text").value.trim();
    const output = document.getElementById("output");
    const pdfButton = document.getElementById("pdfButton");

    if (!email || !text) {
        output.innerText = "Bitte E-Mail und Text eingeben.";
        return;
    }

    output.innerText = "Jurico analysiert...";
    pdfButton.style.display = "none";

    try {
        const res = await fetch("/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                text: text
            })
        });

        if (res.status === 403) {
            output.innerText = "Kostenloses Limit erreicht. Bitte Pro freischalten.";
            return;
        }

        const data = await res.json();

        if (data.analyse) {
            output.innerText = data.analyse;
            lastAnalysisId = data.analysis_id;
            pdfButton.style.display = "block";
        } else if (data.error) {
            output.innerText = "Fehler:\n" + data.error;
        } else {
            output.innerText = JSON.stringify(data, null, 2);
        }

    } catch (e) {
        output.innerText = "Verbindungsfehler:\n" + e;
    }
}

async function checkout() {
    const email = document.getElementById("email").value.trim();

    if (!email) {
        alert("Bitte E-Mail eingeben.");
        return;
    }

    const res = await fetch("/create-checkout-session", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email
        })
    });

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    } else {
        alert("Checkout konnte nicht gestartet werden.");
    }
}

async function loadHistory() {
    const email = document.getElementById("email").value.trim();
    const history = document.getElementById("history");

    if (!email) {
        history.innerText = "Bitte E-Mail eingeben.";
        return;
    }

    const res = await fetch("/history?email=" + encodeURIComponent(email));
    const data = await res.json();

    if (!data.length) {
        history.innerText = "Keine Analysen gefunden.";
        return;
    }

    history.innerHTML = "";

    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
            <strong>Analyse #${item.id}</strong><br>
            <span class="small">${item.created_at}</span><br>
            ${item.input_text.substring(0, 160)}...
            <br>
            <button class="secondary" onclick="openReport(${item.id})">PDF öffnen</button>
        `;
        history.appendChild(div);
    });
}

function downloadPdf() {
    if (!lastAnalysisId) {
        alert("Noch keine Analyse vorhanden.");
        return;
    }
    window.open("/report/" + lastAnalysisId, "_blank");
}

function openReport(id) {
    window.open("/report/" + id, "_blank");
}
</script>

</body>
</html>
