<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Jurico MVP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>JURICO – Datenanalyse</h1>

<h3>Datenquelle wählen</h3>

<select id="dataSource">
  <option value="manual">Manuelle Eingabe</option>
  <option value="upload">Datei hochladen</option>
  <option value="outlook">Outlook (Beta)</option>
  <option value="network">Netzlaufwerk (Beta)</option>
</select>

<div id="manualInput">
  <textarea id="caseText" placeholder="Fallschilderung"></textarea>
</div>

<div id="uploadInput" style="display:none;">
  <input type="file" id="fileInput">
</div>

<br><br>
<button id="analyzeBtn">Fall analysieren</button>

<h3>Output</h3>
<pre id="output">Bereit.</pre>

<script src="app.js"></script>

</body>
</html>
